<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A Bakeshop - POS Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        .page-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background-color: #FFFACD;
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #DAA520;
        }

        .sidebar .brand span {
            font-size: 32px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar nav a {
            display: block;
            padding: 14px 16px;
            border-radius: 10px;
            color: #333;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.25s ease, transform 0.25s ease;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background-color: #FFD700;
            transform: translateX(2px);
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            padding: 30px 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            grid-column: 1 / -1;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 32px;
            color: #DAA520;
        }

        .cart-section {
            background-color: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            height: fit-content;
            position: sticky;
            top: 30px;
        }

        .cart-section h2 {
            margin-top: 0;
            color: #DAA520;
            font-size: 20px;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #FFF8E1;
            border-radius: 8px;
            font-size: 13px;
        }

        .cart-item-name {
            flex: 1;
        }

        .cart-item-qty {
            margin: 0 8px;
            font-weight: bold;
        }

        .cart-item-price {
            font-weight: bold;
            color: #DAA520;
        }

        .remove-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .remove-btn:hover {
            background-color: #ff5252;
        }

        .cart-total {
            border-top: 2px solid #FFD700;
            padding-top: 12px;
            margin-top: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #DAA520;
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background-color: #DAA520;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }

        .checkout-btn:hover {
            background-color: #c49420;
        }

        .products-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background-color: #FFF1A8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-weight: bold;
            font-size: 14px;
            margin: 0 0 5px 0;
            color: #DAA520;
        }

        .product-description {
            font-size: 12px;
            color: #666;
            margin: 0 0 10px 0;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #DAA520;
            margin: 0 0 10px 0;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background-color: #FFD700;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background-color: #FFC700;
        }

        .empty-cart {
            text-align: center;
            color: #999;
            padding: 20px 10px;
            font-size: 14px;
        }

        @media (max-width: 960px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <div class="brand"><span>🍞</span> M&A Admin</div>
            <nav>
                <a href="posPanel.html" class="active">POS</a>
                <a href="index.html">Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1>POS Panel</h1>
                <div class="user-info">Cashier • M&A Bakeshop</div>
            </div>

            <div class="cart-section">
                <h2>Cart</h2>
                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">No items in cart</div>
                </div>
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">₱0.00</span>
                </div>
                <button class="checkout-btn">Checkout</button>
            </div>

            <div class="products-section">
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be generated by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Product database
        const products = [
            { id: 1, name: 'Chocolate Croissant', description: 'Buttery and flaky', price: 4.50, image: '/images/croissant.jpg' },
            { id: 2, name: 'Blueberry Muffin', description: 'Fresh blueberry', price: 3.75, image: '/images/muffin.jpg' },
            { id: 3, name: 'Whole Wheat Bread', description: 'Healthy choice', price: 5.00, image: '/images/bread.jpg' },
            { id: 4, name: 'Donut', description: 'Sweet and glazed', price: 2.50, image: '/images/donut.jpg' },
            { id: 5, name: 'Croissant', description: 'Plain croissant', price: 3.50, image: '/images/croissant2.jpg' },
            { id: 6, name: 'Bagel', description: 'With cream cheese', price: 4.00, image: '/images/bagel.jpg' },
            { id: 7, name: 'Pie', description: 'Apple pie slice', price: 4.75, image: '/images/pie.jpg' },
            { id: 8, name: 'Cake Slice', description: 'Chocolate cake', price: 5.50, image: '/images/cake.jpg' }
        ];

        let cart = [];

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" />
                    </div>
                    <div class="product-info">
                        <p class="product-name">${product.name}</p>
                        <p class="product-description">${product.description}</p>
                        <p class="product-price">₱${product.price.toFixed(2)}</p>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Update cart display
        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">No items in cart</div>';
                cartTotal.textContent = '$0.00';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span class="cart-item-name">${item.name}</span>
                    <span class="cart-item-qty">x${item.quantity}</span>
                    <span class="cart-item-price">₱${(item.price * item.quantity).toFixed(2)}</span>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = '₱' + total.toFixed(2);
        }

        // Initialize
        renderProducts();
    </script>
</body>

</html>
