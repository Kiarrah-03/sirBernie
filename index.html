<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M&A Bakeshop - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #F3E9D7;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            padding-right: 40px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/images/loginPicNoBG.png');
            background-size: 40%;
            background-position: left center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.8;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            display: flex;
            width: 750px;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* LEFT side - photo */
        .photo-side {
            flex: 1;
            position: relative;
            background-image: url('/images/loginPicture.jpg');
            background-size: cover;
            background-position: center;
        }

        .photo-side .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.45);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .photo-side .overlay .logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .photo-side .overlay h2 {
            font-size: 20px;
        }

        .photo-side .overlay p {
            font-size: 13px;
            color: #FFD700;
            margin-top: 4px;
        }

        /* RIGHT side - form */
        .form-side {
            width: 320px;
            background: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-side h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 6px;
        }

        .form-side p {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        .form-side label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-side input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #f9f9f9;
        }

        .form-side select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #f9f9f9;
            cursor: pointer;
        }

        .form-side select:focus {
            outline: none;
            border-color: #FFA500;
            background-color: #fff;
        }

        .form-side input:focus {
            outline: none;
            border-color: #FFA500;
            background-color: #fff;
        }

        .form-side button {
            width: 100%;
            padding: 13px;
            background-color: #FFA500;
            color: white;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .form-side button:hover {
            background-color: #e69400;
        }

        .form-side .brand {
            font-size: 13px;
            color: #aaa;
            text-align: center;
            margin-top: 20px;
        }

        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="card">
        
        <!-- LEFT: Photo -->
        <div class="photo-side">
            <div class="overlay">
                <img src="/images/loginPicNoBG.png" alt="M&A Bakeshop Logo" class="logo-img" />
                <h2>M&A Bakeshop</h2>
                <p>Premium Bakery Since 2019</p>
            </div>
        </div>

        <div class="form-side">
            <h2>Login</h2>
            <p>Enter your credentials to continue.</p>

            <div id="errorMessage" class="error"></div>

            <form id="loginForm">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required />

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required />

                <button type="submit">Login</button>
            </form>

            <p class="brand">M&A Bakeshop &copy; 2025</p>
        </div>

    </div>

    <script>
        // User credentials and roles
        const users = {
            'owner': { password: 'owner123', role: 'owner', panel: 'adminPanel.html' },
            'admin': { password: 'admin123', role: 'admin', panel: 'managerPanel.html' },
            'cashier': { password: 'cashier123', role: 'cashier', panel: 'cashierPanel.html' }
        };

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorMessage.textContent = '';

            if (users[username] && users[username].password === password) {
                // Store user info in session
                sessionStorage.setItem('userRole', users[username].role);
                sessionStorage.setItem('username', username);

                // Redirect to appropriate panel
                window.location.href = users[username].panel;
            } else {
                errorMessage.textContent = 'Invalid username or password';
            }
        });
    </script>
