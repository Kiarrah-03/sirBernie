<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Bakery System - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0px 0;
        }

        header {
            background-color: #FFFACD;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .logo {
            font-size: 36px;
            color: #DAA520;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .bakery-name {
            margin-left: 10px;
            font-size: 24px;
            color: #333;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #FFD700;
        }

        .login-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 600px;
            max-width: 95%;
            min-height: 400px;
            display: flex;
            margin-top: 40px;
        }

        .logo-section {
            flex: 1;
            background-color: #FFFACD;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px 0 0 8px;
        }

        .logo-section .logo {
            font-size: 48px;
        }

        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-btn {
            background-color: #FFD700;
            color: #333;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }

        .login-btn:hover {
            background-color: #FFA500;
        }
    </style>

</head>

<body>
    <header>
        <div class="logo">
             <span class="bakery-name">M&A Bakeshop</span>
        </div>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="dashboard.html#products">Products</a>
            <a href="dashboard.html#about">About</a>
            <a href="index.html">Login</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">🍞 Bakery POS</div>
        </div>
        <div class="form-section">
            <h2>Login</h2>
            <form id="login-form" action="adminPanel.html" method="get">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>
</body>

</html>
