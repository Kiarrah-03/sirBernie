<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&A Bakeshop - Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .page-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background-color: #FFFACD;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #DAA520;
        }
        .sidebar .brand span {
            font-size: 32px;
        }
        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar nav a {
            display: block;
            padding: 14px 16px;
            border-radius: 10px;
            color: #333;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.25s ease, transform 0.25s ease;
        }
        .sidebar nav a:hover,
        .sidebar nav a.active {
            background-color: #FFD700;
            transform: translateX(2px);
        }
        .main-content {
            padding: 30px 40px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .top-bar h1 {
            margin: 0;
            font-size: 32px;
            color: #DAA520;
        }
        .top-bar .user-info {
            background-color: white;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .card h2 {
            margin-top: 0;
            color: #DAA520;
        }
        .card p {
            color: #555;
            line-height: 1.6;
        }
        .card.small {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card.small h3 {
            margin: 0;
            font-size: 22px;
        }
        .card.small span {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        .module {
            background-color: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .module h2 {
            margin-top: 0;
            color: #DAA520;
        }
        .module table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .module th,
        .module td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }
        .module th {
            background-color: #FFF1A8;
        }
        .module tbody tr:hover {
            background-color: #fff8d6;
        }
        .callout {
            background-color: #FFF8E1;
            border-left: 5px solid #DAA520;
            padding: 18px 22px;
            border-radius: 14px;
            margin-top: 20px;
            color: #444;
        }
        @media (max-width: 960px) {
            .page-wrapper {
                grid-template-columns: 1fr;
            }
            .sidebar {
                flex-direction: row;
                overflow-x: auto;
                padding: 20px;
                gap: 16px;
            }
            .sidebar nav {
                flex-direction: row;
            }
            .sidebar nav a {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <div class="brand"><span></span> M&A Admin</div>
            <nav>
                <a href="adminPanel.html" class="active">Dashboard</a>
                <a href="reportPanel.html">Report</a>
                <a href="inventoryProduct.html">Inventory</a>
                <a href="index.html">Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1>Admin Panel</h1>
                <div class="user-info">Admin • M&A Bakeshop</div>
            </div>

            <div id="dashboard" class="section-grid">
                <div class="card small">
                    <div>
                        <h3>Sales Today</h3>
                        <span>2,420</span>
                    </div>
                </div>
                <div class="card small">
                    <div>
                        <h3>Active Orders</h3>
                        <span>14</span>
                    </div>
                </div>
                <div class="card small">
                    <div>
                        <h3>Stock Alerts</h3>
                        <span>5</span>
                    </div>
                </div>
            </div>

           
        </main>
    </div>
</body>
</html>
